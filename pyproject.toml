[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "refactorika"
version = "0.2.0"
requires-python = ">=3.11"
dependencies = [
    "anthropic[mcp]>=0.111.0",
    "tree-sitter>=0.23.0",
    "tree-sitter-python>=0.23.0",
    "libcst>=1.4.0",
    "rope>=1.13.0",
    "jedi>=0.19.0",
    "autoflake>=2.3.0",
    "radon>=6.0.0",
    "typer>=0.12.0",
    "redis>=5.0.0",
    "numpy>=1.24",
]

[project.optional-dependencies]
semantic = [
    "sentence-transformers>=2.0",
    "openai>=1.0",
]
dev = [
    "pytest>=8.0.0",
    "pyright>=1.1.0",
    "ruff>=0.6.0",
]

[project.scripts]
refactorika = "refactorika.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["refactorika"]

[tool.pyright]
pythonVersion = "3.11"
include = ["refactorika"]
strict = true

[tool.ruff]
src = ["refactorika"]
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I"]
