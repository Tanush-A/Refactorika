[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "refactorika"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "anthropic[mcp]>=0.111.0",
    "tree-sitter>=0.23.0",
    "tree-sitter-python>=0.23.0",
    "redis>=5.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pyright>=1.1.0",
    "ruff>=0.6.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/refactorika"]

[tool.pyright]
pythonVersion = "3.11"
include = ["src"]
strict = true

[tool.ruff]
src = ["src"]
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I"]
